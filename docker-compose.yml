services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: erp_dev
      POSTGRES_USER: erp_app
      POSTGRES_PASSWORD: erp_app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_app -d erp_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    ports:
      - "8080:80"

  backup:
    image: postgres:16-alpine
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./database/backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "while true; do
      pg_dump \"$${DATABASE_URL}\" | gzip > /backups/erp_$$(date +%Y%m%d_%H%M%S).sql.gz;
      find /backups -type f -mtime +$${BACKUP_RETENTION_DAYS:-14} -delete;
      sleep 86400;
      done"

volumes:
  postgres_data:
